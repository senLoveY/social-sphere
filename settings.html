<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Настройки профиля пользователя Valery Malaichuk"
    />
    <title>Profile Settings | Valery Malaichuk</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/script.js"></script> 
    <script src="js/utils/helpers.js"></script>
    <script src="js/components/modal.js"></script>
</html>
  </head>
  <body itemscope itemtype="https://schema.org/WebPage">
    
    <div class="layout">
      <!-- Sidebar (боковая панель) -->
      <aside class="sidebar">
        <nav class="sidebar__nav">
          <ul class="sidebar__list">
            <li class="sidebar__item">
              <a href="index.html" class="sidebar__link " aria-label="Лента">
                <span class="sidebar__icon sidebar__icon--home"></span>
              </a>
            </li>
            <li class="sidebar__item">
              <a href="#" class="sidebar__link sidebar__link--active" aria-label="Profile">
                <span class="sidebar__icon sidebar__icon--profile"></span>
              </a>
            </li>
            <li class="sidebar__item">
              <a href="#" class="sidebar__link" aria-label="Messages">
                <span class="sidebar__icon sidebar__icon--chats"></span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Правая часть контента -->
      <div class="layout__content">
        <!-- Шапка сайта -->
          <header class="header header--feed" itemscope itemtype="https://schema.org/WPHeader">
                <div class="header__container">
                    <!-- ЛОГОТИП SocialSphere — кликабельный, ведет на ленту -->
                    <a href="index.html" class="header__logo" aria-label="На главную">
                        <span class="header__logo-text header__logo--social">Social</span><span class="header__logo-text header__logo--sphere">Sphere</span>
                    </a>

                    <div class="header__burger" id="burger-menu">
                        <span></span><span></span><span></span>
                    </div>

                    <div class="header__actions">
                        <div class="header__search-box">
                            <input type="search" class="header__search" placeholder="Search">
                        </div>
                        <div class="header__notifications">
                            <span class="header__badge">24</span>
                            <span class="header__icon-bell"></span>
                        </div>
                        <img src="images/valery_avatar.jpg" alt="Avatar" class="header__avatar" width="40">
                    </div>
                </div>

                <nav class="mobile-menu" id="mobile-menu">
                    <ul class="mobile-menu__list">
                        <li class="mobile-menu__item">
                            <a href="index.html" class="mobile-menu__link">Лента</a>
                        </li>
                        <li class="mobile-menu__item">
                            <a href="profile.html" class="mobile-menu__link">Профиль</a>
                        </li>
                        <li class="mobile-menu__item">
                            <a href="messages.html" class="mobile-menu__link">Сообщения</a>
                        </li>
                        <li class="mobile-menu__item">
                            <a href="settings.html" class="mobile-menu__link">Настройки</a>
                        </li>
                    </ul>
                </nav>
            </header>

        <!-- Основной контент страницы -->
        <main
          class="main-content"
          id="main-content"
          itemprop="mainContentOfPage"
        >
          <article
            class="profile-card"
            itemscope
            itemtype="https://schema.org/Person"
          >
            <div class="profile-card__banner"></div>

            <div class="profile-card__user">
              <img
                src="images/valery_avatar.jpg"
                alt="User Photo"
                class="profile-card__avatar"
                itemprop="image"
              />
              <div class="profile-card__details">
                <h2 class="profile-card__name" itemprop="name">
                  Valery Malaichuk
                </h2>
                <p class="profile-card__email" itemprop="email">
                  valera@gmail.com
                </p>
              </div>
              <button type="button" class="btn btn--primary profile-card__btn">
                Edit
              </button>
            </div>

            <div class="settings" itemprop="description">
              <form class="settings-form" action="#">
                <div class="settings-form__grid">
                  <div class="settings-form__field">
                    <label class="settings-form__label" for="full-name"
                      >Full Name</label
                    >
                    <input
                      class="settings-form__input"
                      type="text"
                      id="full-name"
                      value="Valery Malaichuk"
                    />
                  </div>

                  <div class="settings-form__field">
                    <label class="settings-form__label" for="nick-name"
                      >Nick Name</label
                    >
                    <input
                      class="settings-form__input"
                      type="text"
                      id="nick-name"
                      placeholder="wings"
                    />
                  </div>

                  <div class="settings-form__field">
                    <label class="settings-form__label" for="gender"
                      >Gender</label
                    >
                    <select
                      class="settings-form__select"
                      id="gender"
                      itemprop="gender"
                    >
                      <option value="male">Male</option>
                      <option value="female">Female</option>
                    </select>
                  </div>

                  <div class="settings-form__field">
                    <label class="settings-form__label" for="country"
                      >Country</label
                    >
                    <select class="settings-form__select" id="country">
                      <option>Belarus</option>
                      <option>United States</option>
                    </select>
                  </div>

                  <div class="settings-form__field">
                    <label class="settings-form__label" for="language"
                      >Language</label
                    >
                    <select class="settings-form__select" id="language">
                      <option>English</option>
                      <option>Russian</option>
                    </select>
                  </div>

                  <div class="settings-form__field">
                    <label class="settings-form__label" for="timezone"
                      >Time Zone</label
                    >
                    <input
                      class="settings-form__input"
                      type="text"
                      id="timezone"
                      placeholder="Your First Name"
                    />
                  </div>
                </div>

                <div class="email-manager">
                  <h3 class="email-manager__title">My email Address</h3>
                  <div class="email-manager__item">
                    <div class="email-manager__icon">
                      <span class="email-manager__svg"></span>
                    </div>
                    <div class="email-manager__info">
                      <p class="email-manager__address">valera@gmail.com</p>
                      <p class="email-manager__time">1 month ago</p>
                    </div>
                  </div>
                  <button
                    type="button"
                    class="btn btn--secondary email-manager__add-btn"
                  >
                    +Add Email Address
                  </button>
                </div>
              </form>
            </div>
          </article>
        </main>
      </div>
    </div>
  </body>
</html>
